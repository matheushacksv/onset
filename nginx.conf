server {
    listen 80;
    server_name onboarding.henriquegoularte.com.br apionboarding.henriquegoularte.com.br;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name apionboarding.henriquegoularte.com.br;
    ssl_certificate /etc/letsencrypt/live/apionboarding.henriquegoularte.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/apionboarding.henriquegoularte.com.br/privkey.pem;

    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl;
    server_name onboarding.henriquegoularte.com.br;
    ssl_certificate /etc/letsencrypt/live/onboarding.henriquegoularte.com.br/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/onboarding.henriquegoularte.com.br/privkey.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
