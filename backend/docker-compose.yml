services:
  db:
    image: pgvector/pgvector:pg17
    environment:
      - POSTGRES_DB=plataforma
      - POSTGRES_USER=plataforma_user
      - POSTGRES_PASSWORD=plataforma
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U plataforma"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: