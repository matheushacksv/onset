name: Deploy

on:
  push:
    branches:
      - main

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push:
    name: Build & push images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      sha: ${{ steps.meta.outputs.sha }}
      backend_img: ${{ steps.meta.outputs.backend_img }}
      frontend_img: ${{ steps.meta.outputs.frontend_img }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          SHA=${GITHUB_SHA::7}
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          {
            echo "sha=$SHA"
            echo "backend_img=ghcr.io/$OWNER/onset-backend"
            echo "frontend_img=ghcr.io/$OWNER/onset-frontend"
          } >> "$GITHUB_OUTPUT"

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ steps.meta.outputs.backend_img }}:latest
            ${{ steps.meta.outputs.backend_img }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ steps.meta.outputs.frontend_img }}:latest
            ${{ steps.meta.outputs.frontend_img }}:${{ steps.meta.outputs.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

  deploy:
    name: Deploy to Swarm
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Debug secrets presence
        run: |
          echo "SSH_HOST set? ${{ secrets.VPS_HOST != '' }}"
          echo "SSH_USER set? ${{ secrets.VPS_USER != '' }}"
          echo "SSH_KEY set? ${{ secrets.SSH_KEY != '' }}"
          echo "DEPLOY_PATH set? ${{ secrets.DEPLOY_PATH != '' }}"

      - name: SSH deploy
        uses: appleboy/ssh-action@v1
        env:
          SHA: ${{ needs.build-and-push.outputs.sha }}
          BACKEND_IMG: ${{ needs.build-and-push.outputs.backend_img }}
          FRONTEND_IMG: ${{ needs.build-and-push.outputs.frontend_img }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.SSH_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          envs: SHA,BACKEND_IMG,FRONTEND_IMG
          script: |
            set -e
            cd ${{ secrets.DEPLOY_PATH }}
            git pull --ff-only
            echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ secrets.GHCR_USER }} --password-stdin
            docker pull "$BACKEND_IMG:$SHA"
            docker pull "$FRONTEND_IMG:$SHA"
            docker service update --image "$BACKEND_IMG:$SHA" onset_backend
            docker service update --image "$BACKEND_IMG:$SHA" onset_worker
            docker service update --image "$FRONTEND_IMG:$SHA" onset_frontend
