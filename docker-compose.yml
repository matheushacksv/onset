services:
  db:
    image: pgvector/pgvector:pg17
    env_file:
      - ./.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data

  backend:
    build: ./backend
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.onset-api.rule=Host(`apionboarding.henriquegoularte.com.br`)"
      - "traefik.http.routers.onset-api.entrypoints=websecure"
      - "traefik.http.routers.onset-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.onset-api.loadbalancer.server.port=8000"

  worker:
    build: ./backend
    command: uv run python manage.py qcluster
    env_file:
      - ./.env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      NUXT_PUBLIC_BACKEND_URL: https://apionboarding.henriquegoularte.com.br
    networks:
      - default
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.onset-app.rule=Host(`onboarding.henriquegoularte.com.br`)"
      - "traefik.http.routers.onset-app.entrypoints=websecure"
      - "traefik.http.routers.onset-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.onset-app.loadbalancer.server.port=3000"

networks:
  default:
  traefik:
    external: true
    name: OHenriquecedorNet

volumes:
  postgres_data:
  redis_data:
